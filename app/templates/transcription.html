{% extends "base.html" %}
{% block title %}Transcription - TunisiaHub{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <h2 class="text-2xl sm:text-3xl font-bold mb-6">🎙️ AI Transcription</h2>

    <div class="bg-gray-100 text-gray-800
            dark:bg-gray-800 dark:text-gray-100
            p-4 sm:p-6 rounded-xl mb-6">

        <div class="mb-4">
            <label class="block text-sm mb-2 font-bold">Input Method</label>

            <!-- Full-width toggle buttons on mobile -->
            <div class="flex gap-2 mb-4">
                <button onclick="setInputMode('file')" id="mode-file-btn"
                    class="flex-1 px-4 py-2 rounded text-sm font-medium
                           bg-blue-600 text-white hover:bg-blue-700">
                    📁 Upload File
                </button>
                <button onclick="setInputMode('url')" id="mode-url-btn"
                    class="flex-1 px-4 py-2 rounded text-sm font-medium
                           bg-gray-200 text-gray-800 hover:bg-gray-300
                           dark:bg-gray-700 dark:text-gray-100 dark:hover:bg-gray-600">
                    🔗 From URL
                </button>
            </div>

            <div id="input-file">
                <input type="file" id="audio-file" accept="audio/*,video/*"
                    class="w-full p-2 rounded border text-sm
                           bg-white text-gray-800 border-gray-300
                           dark:bg-gray-900 dark:text-gray-100 dark:border-gray-700">
                <!-- Mobile helper text -->
                <p class="text-xs text-gray-400 mt-1 sm:hidden">Supports audio and video files</p>
            </div>

            <div id="input-url" class="hidden">
                <input type="text" id="audio-url"
                    placeholder="YouTube / TikTok URL"
                    class="w-full p-2 rounded border text-sm
                           bg-white text-gray-800 border-gray-300 placeholder-gray-500
                           dark:bg-gray-900 dark:text-gray-100 dark:border-gray-700 dark:placeholder-gray-400">
                <p class="text-xs text-gray-400 mt-1">Audio will be extracted automatically</p>
            </div>
        </div>

        <div class="mb-4">
            <label class="block text-sm mb-1 font-medium">Language</label>
            <select id="lang"
                class="w-full p-2 rounded border text-sm
                       bg-white text-gray-800 border-gray-300
                       dark:bg-gray-900 dark:text-gray-100 dark:border-gray-700">
                <option value="ar">Arabic</option>
                <option value="en">English</option>
                <option value="fr">French</option>
                <option value="auto">Auto Detect</option>
            </select>
        </div>

        <button onclick="transcribe()" id="btn-transcribe"
            class="w-full bg-green-600 text-white p-3 rounded font-bold hover:bg-green-700 text-sm sm:text-base active:scale-95 transition-transform">
            🎙️ Transcribe
        </button>

        <!-- Status with spinner on mobile -->
        <div id="transcribe-status-wrap" class="hidden mt-3 flex items-center justify-center gap-2">
            <svg id="status-spinner" class="w-4 h-4 animate-spin text-blue-500 hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
            </svg>
            <p id="transcribe-status" class="text-sm text-gray-500 dark:text-gray-400 text-center"></p>
        </div>
    </div>

    <!-- Result -->
    <div id="transcription-result"
         class="hidden bg-gray-100 text-gray-800
                dark:bg-gray-800 dark:text-gray-100
                p-4 sm:p-6 rounded-xl mb-24">

        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-lg sm:text-xl">Result</h3>
            <button onclick="exportTxt()"
                class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700 active:scale-95 transition-transform">
                Export TXT
            </button>
        </div>

        <!-- Shorter box on mobile to avoid overflow -->
        <div id="transcription-text"
             class="bg-gray-200 text-gray-800
                    dark:bg-gray-900 dark:text-gray-300
                    p-3 sm:p-4 rounded overflow-y-auto whitespace-pre-wrap
                    font-mono text-xs sm:text-sm"
             style="height: clamp(200px, 50vh, 384px);">
        </div>
    </div>
</div>

<script>
    let currentMode = 'file';

    function setInputMode(mode) {
        currentMode = mode;
        document.getElementById('input-file').classList.toggle('hidden', mode !== 'file');
        document.getElementById('input-url').classList.toggle('hidden', mode !== 'url');

        const fileBtn = document.getElementById('mode-file-btn');
        const urlBtn  = document.getElementById('mode-url-btn');

        fileBtn.className = `flex-1 px-4 py-2 rounded text-sm font-medium ${
            mode === 'file'
            ? 'bg-blue-600 text-white hover:bg-blue-700'
            : 'bg-gray-200 text-gray-800 hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-100 dark:hover:bg-gray-600'
        }`;
        urlBtn.className = `flex-1 px-4 py-2 rounded text-sm font-medium ${
            mode === 'url'
            ? 'bg-blue-600 text-white hover:bg-blue-700'
            : 'bg-gray-200 text-gray-800 hover:bg-gray-300 dark:bg-gray-700 dark:text-gray-100 dark:hover:bg-gray-600'
        }`;
    }

    function setStatus(msg, spinning = false) {
        const wrap = document.getElementById('transcribe-status-wrap');
        const txt  = document.getElementById('transcribe-status');
        const spin = document.getElementById('status-spinner');
        wrap.classList.remove('hidden');
        txt.innerText = msg;
        spin.classList.toggle('hidden', !spinning);
    }

    async function transcribe() {
        const btn = document.getElementById('btn-transcribe');
        btn.disabled = true;
        setStatus("Sending to server...", true);

        const fd = new FormData();
        fd.append('language', document.getElementById('lang').value);

        if (currentMode === 'url') {
            const url = document.getElementById('audio-url').value;
            if (!url) { btn.disabled = false; return alert("Enter a URL"); }
            fd.append('url', url);
            setStatus("Extracting audio & running AI...", true);
        } else {
            const file = document.getElementById('audio-file').files[0];
            if (!file) { btn.disabled = false; return alert("Select a file"); }
            fd.append('file', file);
            setStatus("Running AI transcription...", true);
        }

        try {
            const res = await fetch('/api/transcribe', { method: 'POST', body: fd });
            if (!res.ok) throw new Error(await res.text());
            const data = await res.json();

            document.getElementById('transcription-result').classList.remove('hidden');
            const formatted = data.segments.map(s => `[${formatTime(s.start)} - ${formatTime(s.end)}] ${s.text}`).join('\n');
            document.getElementById('transcription-text').innerText = formatted;
            setStatus("Done! ✅", false);

            // Scroll to result on mobile
            document.getElementById('transcription-result').scrollIntoView({ behavior: 'smooth', block: 'start' });
        } catch(e) {
            setStatus("Error: " + e.message, false);
        } finally {
            btn.disabled = false;
        }
    }

    function formatTime(s) {
        const m = Math.floor(s / 60);
        const sec = (s % 60).toFixed(1);
        return `${m}:${sec.padStart(4, '0')}`;
    }

    function exportTxt() {
        const text = document.getElementById('transcription-text').innerText;
        const blob = new Blob([text], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'transcription.txt';
        a.click();
    }
</script>
{% endblock %}
