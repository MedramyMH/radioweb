{% extends "base.html" %}
{% block title %}Create News - TunisiaHub{% endblock %}

{% block content %}

<h2 class="text-3xl font-bold mb-6">Create Article</h2>

<form action="/admin/news/create" method="POST" class="bg-gray-800 p-6 rounded-xl space-y-4 max-w-4xl">

    <input
        type="text"
        name="title"
        placeholder="Article Title"
        required
        class="w-full bg-gray-900 p-3 rounded border border-gray-700">

    <select
        name="category"
        class="w-full bg-gray-900 p-3 rounded border border-gray-700">

        <option value="Politics">Politics</option>
        <option value="Economy">Economy</option>
        <option value="Tech">Tech</option>
        <option value="Sports">Sports</option>

    </select>

    <textarea
        id="editor"
        name="content"
        dir="rtl"
        class="w-full h-96 bg-gray-900 p-3 rounded border border-gray-700">
    </textarea>

    <input
        type="text"
        name="meta_description"
        placeholder="SEO Meta Description"
        class="w-full bg-gray-900 p-3 rounded border border-gray-700">

    <label class="flex items-center gap-2">
        <input type="checkbox" name="is_featured" class="w-5 h-5">
        <span>Featured Article</span>
    </label>

    <button
        type="submit"
        class="bg-green-600 px-6 py-3 rounded font-bold hover:bg-green-700">
        Publish
    </button>

</form>

<!-- TinyMCE -->
<script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>

<script>
tinymce.init({

    selector: "#editor",

    height: 600,

    menubar: true,

    plugins: [
        "lists",
        "link",
        "image",
        "code",
        "table",
        "directionality",
        "autolink"
    ],

    toolbar:
        "undo redo | " +
        "blocks | " +
        "bold italic underline | " +
        "alignleft aligncenter alignright alignjustify | " +
        "ltr rtl | " +
        "bullist numlist | " +
        "link image table | " +
        "removeformat code",

    directionality: "rtl",

    content_style: `
        body{
            direction: rtl;
            text-align:right;
            font-family:Tahoma, Arial, sans-serif;
            font-size:16px;
            line-height:1.9;
            padding:15px;
        }

        p,h1,h2,h3,h4,h5,h6,ul,ol{
            direction:rtl;
            text-align:right;
        }
    `,

    setup: function(editor) {

        editor.on("init", function () {
                editor.getBody().dir = "auto";
            });

        editor.on("keyup", function () {

            const text = editor.getContent({format:"text"}).trim();

            if (/[\u0600-\u06FF]/.test(text)) {

                editor.getBody().dir = "rtl";
                editor.getBody().style.textAlign = "right";

            } else {

                editor.getBody().dir = "ltr";
                editor.getBody().style.textAlign = "left";

            }

        });

    },

    images_upload_handler: (blobInfo) => {

        return new Promise((resolve) => {

            const reader = new FileReader();

            reader.onload = () => resolve(reader.result);

            reader.readAsDataURL(blobInfo.blob());

        });

    }

});
</script>

{% endblock %}
