{% extends "base.html" %}
{% block title %}Home - TunisiaHub{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto text-center py-20">
    <h2 class="text-5xl font-extrabold mb-6 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
        All-in-One Tunisian Media Platform
    </h2>
    <p class="text-xl text-gray-400 mb-8">Radio, News, Video Editing, and AI Transcription.</p>
    
    <div class="grid grid-cols-2 gap-6 mt-12">

    <a href="/radio"
       class="p-6 rounded-xl transition
              bg-gray-100 text-gray-800 hover:bg-gray-200
              dark:bg-gray-800 dark:text-gray-100 dark:hover:bg-gray-700">
        📻 Web Radio
    </a>

    <a href="/news"
       class="p-6 rounded-xl transition
              bg-gray-100 text-gray-800 hover:bg-gray-200
              dark:bg-gray-800 dark:text-gray-100 dark:hover:bg-gray-700">
        📰 News CMS
    </a>

    <a href="/downloader"
       class="p-6 rounded-xl transition
              bg-gray-100 text-gray-800 hover:bg-gray-200
              dark:bg-gray-800 dark:text-gray-100 dark:hover:bg-gray-700">
        ⬇️ Downloader
    </a>

    <a href="/transcription"
       class="p-6 rounded-xl transition
              bg-gray-100 text-gray-800 hover:bg-gray-200
              dark:bg-gray-800 dark:text-gray-100 dark:hover:bg-gray-700">
        🎙️ Transcription
    </a>

</div>
</div>
{% endblock %}
