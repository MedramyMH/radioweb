{% extends "base.html" %}
{% block title %}Edit Article - TunisiaHub{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto">

    <h2 class="text-2xl sm:text-3xl font-bold mb-4">✏️ Edit Article</h2>

    <a href="/admin/"
       class="inline-block mb-6 bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600
              px-4 py-2 rounded text-gray-800 dark:text-white text-sm">
        ← Back to Dashboard
    </a>

    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 p-4 sm:p-6 rounded-xl mb-32">
        <form id="article-form"
              method="POST"
              action="/admin/edit/{{ article.id }}"
              enctype="multipart/form-data"
              class="space-y-4">

            <input type="text"
                   name="title"
                   value="{{ article.title }}"
                   required
                   class="w-full bg-gray-50 dark:bg-gray-900 p-3 rounded border
                          border-gray-200 dark:border-gray-700
                          text-gray-900 dark:text-white text-sm sm:text-base">

            <div>
                <label class="block text-sm mb-1 text-gray-600 dark:text-gray-300 font-medium">
                    Replace Cover Image (Optional)
                </label>
                <input type="file"
                       name="image"
                       accept="image/*"
                       class="w-full bg-gray-50 dark:bg-gray-900 p-2 rounded border
                              border-gray-200 dark:border-gray-700
                              text-gray-900 dark:text-white text-sm">
                {% if article.image_url %}
                <div class="mt-3">
                    <p class="text-gray-500 dark:text-gray-400 text-xs mb-2">Current image:</p>
                    <img src="{{ article.image_url }}"
                         class="w-full sm:w-48 max-w-xs rounded-lg border border-gray-200 dark:border-gray-700">
                </div>
                {% endif %}
            </div>

            <!-- Stack on mobile, 2 cols on sm -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <select name="category" required
                        class="bg-gray-50 dark:bg-gray-900 p-3 rounded border
                               border-gray-200 dark:border-gray-700
                               text-gray-900 dark:text-white text-sm">
                    <option value="Politics"  {% if article.category=="Politics"  %}selected{% endif %}>Politics</option>
                    <option value="Economy"   {% if article.category=="Economy"   %}selected{% endif %}>Economy</option>
                    <option value="Tech"      {% if article.category=="Tech"      %}selected{% endif %}>Tech</option>
                    <option value="Sports"    {% if article.category=="Sports"    %}selected{% endif %}>Sports</option>
                    <option value="Religion"  {% if article.category=="Religion"  %}selected{% endif %}>Religion</option>
                    <option value="Culture"   {% if article.category=="Culture"   %}selected{% endif %}>Culture</option>
                    <option value="Health"    {% if article.category=="Health"    %}selected{% endif %}>Health</option>
                    <option value="Education" {% if article.category=="Education" %}selected{% endif %}>Education</option>
                </select>
                <input type="text"
                       name="meta_description"
                       value="{{ article.meta_description }}"
                       placeholder="SEO Meta Description"
                       class="bg-gray-50 dark:bg-gray-900 p-3 rounded border
                              border-gray-200 dark:border-gray-700
                              text-gray-900 dark:text-white text-sm">
            </div>

            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" name="is_featured" class="w-4 h-4"
                       {% if article.is_featured %}checked{% endif %}>
                <span class="text-sm text-gray-600 dark:text-gray-300">Mark as Featured</span>
            </label>

            <!-- Quill editor — adaptive height -->
            <div id="quill-editor" class="bg-white rounded-lg text-black"
                 style="height: clamp(220px, 45vh, 300px);"></div>
            <textarea id="editor" name="content" class="hidden"></textarea>

            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 transition-transform
                           px-6 py-3 sm:py-4 rounded-lg font-bold text-white text-base sm:text-lg">
                UPDATE ARTICLE
            </button>
        </form>
    </div>
</div>

<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
    const quill = new Quill('#quill-editor', {
        theme: 'snow',
        placeholder: 'Edit article content...',
        modules: {
            toolbar: [
                [{ header: [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ color: [] }, { background: [] }],
                [{ list: 'ordered' }, { list: 'bullet' }],
                [{ indent: '-1' }, { indent: '+1' }],
                [{ align: [] }],
                [{ direction: 'rtl' }],
                ['blockquote', 'code-block'],
                ['link', 'image'],
                ['clean']
            ]
        }
    });

    quill.format('direction', 'rtl');
    quill.format('align', 'right');
    quill.root.innerHTML = `{{ article.content | safe }}`;

    quill.getModule('toolbar').addHandler('image', function () {
        const input = document.createElement('input');
        input.setAttribute('type', 'file');
        input.setAttribute('accept', 'image/*');
        input.click();
        input.onchange = () => {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const range = quill.getSelection(true);
                quill.insertEmbed(range.index, 'image', e.target.result);
                quill.setSelection(range.index + 1);
            };
            reader.readAsDataURL(file);
        };
    });

    document.getElementById('article-form').addEventListener('submit', function (e) {
        const content = document.querySelector('#editor');
        content.value = quill.root.innerHTML;
        if (!content.value || content.value === '<p><br></p>') {
            e.preventDefault();
            alert("Please write some content for the article.");
        }
    });
</script>
{% endblock %}
